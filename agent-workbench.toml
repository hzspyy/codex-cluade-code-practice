[audit]
required_files = [
  "AGENTS.md",
  "CLAUDE.md",
  "LICENSE",
  ".github/pull_request_template.md",
  ".github/workflows/validate.yml"
]
json_files = [
  ".codex/hooks.json",
  ".claude/settings.json"
]
executable_files = [
  "scripts/validate.sh",
  ".githooks/pre-commit"
]
workflow_files = [
  ".github/workflows/*.yml",
  ".github/workflows/*.yaml",
  "action.yml",
  "action.yaml"
]
hook_json_files = [
  ".codex/hooks.json",
  ".claude/settings.json"
]
ignored_dirs = [
  ".git",
  ".agent-state",
  ".codex-log",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "__pycache__",
  "node_modules",
  "dist",
  "build"
]
allowed_unpinned_actions = [
  "hzspyy/codex-cluade-code-practice"
]
allowed_broad_permission_workflows = [
  ".github/workflows/release.yml"
]
allowed_write_permission_workflows = []
allowed_ungated_privileged_workflows = []

[audit.severity_overrides]

[guidance]
"AGENTS.md" = ["Review guidelines", "Commands"]
"CLAUDE.md" = ["validate"]
