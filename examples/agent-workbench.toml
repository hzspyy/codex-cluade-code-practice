[audit]
required_files = [
  "AGENTS.md",
  "CLAUDE.md",
  "LICENSE",
  ".github/pull_request_template.md",
  ".github/workflows/validate.yml"
]
json_files = [".codex/hooks.json", ".claude/settings.json"]
